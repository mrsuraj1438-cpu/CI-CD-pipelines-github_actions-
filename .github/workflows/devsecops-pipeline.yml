name: devSecOps Pipeline

on:
    push:
        branches: [main]

jobs:
    # CI (continuous integration)
    code-quality:
        uses: ./.github/workflows/code_check.yml

    scan-secret:
        uses: ./.github/workflows/secrets-scan.yml

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-lint:
        needs: [code-quality, scan-secret, dependency-scan]
        uses: ./.github/workflows/docker-lint.yml

    # Build once the security scans are comlete
    build:
        needs: [code-quality, scan-secret, dependency-scan, docker-lint]
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit

    trivy:
        needs: [build]
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit

    # CD (continuous deployment) - deploy to production server if the image scan is successful
    deploy:
        needs: [trivy]
        uses: ./.github/workflows/deploy-to-server.yml
        secrets: inherit
