name: Docker build and push

on:
    push:
        branches: [main]
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository code
              uses: actions/checkout@v5

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USER }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker buil and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{vars.DOCKERHUB_USER}}/git-hub-actions-app:${{ github.ref_name}}
                      ${{vars.DOCKERHUB_USER}}/git-hub-actions-app:latest
                      ${{vars.DOCKERHUB_USER}}/git-hub-actions-app:${{github.sha}}
