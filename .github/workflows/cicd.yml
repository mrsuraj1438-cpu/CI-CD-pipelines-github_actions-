name: CI/CD-Pipeline

on:
    workflow_dispatch:
        inputs:
            environment:
                description: This is the environment value where this  workflow run
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - staging
                    - prod

    #push:
    #branches: [main]
    #paths:
    #    - "**.html"

jobs:
    code:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              run: echo "Code clone from github"

    build:
        needs: code
        runs-on: ubuntu-latest
        steps:
            - name: Build the Docker Container
              run: echo "Docker Container build"

    test:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Test the Container
              run: echo "Testing the container"

    deploy:
        needs: [build, test]
        runs-on: ubuntu-latest
        if: inputs.environment == 'dev'
        steps:
            - name: Deploy the container
              run: echo "deploy the container"
