<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Zero To Hero</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
        }

        .container {
            text-align: center;
            max-width: 700px
        }

        h1 {
            font-size: 2.7rem;
            background: linear-gradient(90deg, #00f5a0, #00d9f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* subtitle */
        .subtitle {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #cbd5e1;
            letter-spacing: 0.04em;
        }

        /* badge */
        .badge {
            margin: 1.2rem 0 2rem;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #00d9f5;
            font-size: 0.8rem;
            color: #00f5a0;
        }

        /* cards */
        .cards {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            padding: 1.2rem;
            min-width: 150px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* pipeline */
        .status {
            margin-top: 2rem;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .status span {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: #111;
            border: 1px solid #444;
        }

        .success {
            color: #00ff9f;
            border-color: #00ff9f
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>DevOps Zero To Hero</h1>

        <!-- unique line -->
        <div class="subtitle">
            Flask Application Deployed using GitHub Actions on Self-Hosted Runner 🚀
        </div>

        <!-- your batch line -->
        <div class="badge">Josh Batch 10</div>

        <div class="cards">
            <div class="card">Flask 3.1</div>
            <div class="card">Python 3.14</div>
            <div class="card">AWS ECS</div>
        </div>

        <div class="status">
            <span class="success">✔ Build</span>
            <span class="success">✔ Test</span>
            <span class="success">✔ Lint</span>
            <span class="success">✔ Deploy</span>
        </div>
    </div>

</body>

</html>
