<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Zero To Hero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #1f1c2c, #0f0c29 70%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 750px;
        }

        h1 {
            font-size: 2.7rem;
            margin-bottom: 0.6rem;
            background: linear-gradient(90deg, #00f5ff, #7b2ff7, #ff4ecd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            display: inline-block;
            margin: 1rem 0 1.5rem;
            padding: 0.4rem 1.3rem;
            border: 1px solid rgba(123, 47, 247, 0.6);
            border-radius: 999px;
            font-size: 0.85rem;
            color: #c4b5fd;
        }

        .subtext {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        .cards {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 1.5rem 1.8rem;
            min-width: 150px;
            flex: 1;
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(123, 47, 247, 0.6);
            box-shadow: 0 0 20px rgba(123, 47, 247, 0.3);
        }

        .card span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .card strong {
            font-size: 1.3rem;
            color: #f9fafb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>DevOps Zero To Hero</h1>

        <div class="badge">Josh Batch 10 (Keep Learning) </div>

        <div class="subtext">
            Built • Tested • Linted • Deployed via GitHub Actions (Self-Hosted Runner)
        </div>

        <div class="cards">
            <div class="card">
                <span>Framework</span>
                <strong>Flask 3.1</strong>
            </div>

            <div class="card">
                <span>Runtime</span>
                <strong>Python 3.14</strong>
            </div>



            <div class="card">
                <span>Deploy</span>
                <strong>AWS ECS</strong>
            </div>

            <div class="card">
                <span>CI/CD</span>
                <strong>GitHub Actions</strong>
            </div>
        </div>
    </div>
</body>

</html>
